---
name: "🔵 BUS-2 JK-BMS (custom fork)"               # ЗМІНЕНО: яскраво відмінна назва, легко знайти в Store
version: 4.1.5-bus2.3
slug: "smartphoton_jkbms_bus2"                     # ЗМІНЕНО: унікальний slug, інакше Supervisor
                                                    #   побачить конфлікт з оригінальним аддоном
description: "[CUSTOM FORK for second RS485 bus] JK-BMS Management — DO NOT confuse with original addon"
url: https://github.com/IevgenVaskivskyi/jkbms-rs485-addon-bus2
ingress: false
ingress_stream: false
panel_icon: mdi:sitemap
init: false
homeassistant: 2025.10.1
arch:
  - aarch64
  - amd64
privileged:
  - NET_ADMIN
  - SYS_RAWIO
ports:
  "1891/tcp": 1892                                 # ЗМІНЕНО: інший зовнішній порт веб-інтерфейсу,
                                                    #   щоб не конфліктувати з основним інстансом
ports_description:
  "1891/tcp": Web interface (Bus 2)
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
auth_api: true
uart: true
map:
  - config:rw
  - media:rw
  - share:rw
options:
  # JK-BMS Configuration
  jkbms_path: "/dev/serial/by-id/usb-FTDI_USB__-_Serial_Converter_FT9LBZ9-if00-port0"   # ЗМІНЕНО: COM1 / ttyUSB3 на платі FTDI
  jkbms_count: 15                                  # ЗМІНЕНО: максимум аддону (запас на майбутнє розширення),
                                                    #   реально підключено 14 — адреси без відповіді
                                                    #   просто додають невелику затримку циклу опитування
  use_gateway: false                                # true, якщо підключення через TCP/IP-шлюз
  gateway_ip_port: "192.168.1.101:5000"            # ЗМІНЕНО: IP/порт другого шлюзу (якщо use_gateway: true)
  communication_debug: false
  bms_broadcasting: false
  non_broadcasting_data_interval_s: 3
  CAN_bus_usage: false
  # MQTT Configuration -- той самий broker, що й у першого інстансу
  mqttadresse_port: "core-mosquitto.local.hass.io:1883"
  mqttuser: "username"
  mqttpass: "password"
  # Telemetry
  Send_bip: true
  # ============================================================
  # 👑 PREMIUM
  # ============================================================
  premium_section: "────────── PREMIUM ──────────"
  premium_key: ""
  # ============================================================
  # 🎨 DASHBOARD
  # ============================================================
  dashboard_section: "────────── DASHBOARD ──────────"
  dashboard_custom_cards_installed: false
  dashboard_language: "fr"
  dashboard_mode: "legacy"
schema:
  # JK-BMS Configuration
  jkbms_path: str
  jkbms_count: int(1,15)?
  use_gateway: bool
  gateway_ip_port: str?
  communication_debug: bool
  bms_broadcasting: bool
  non_broadcasting_data_interval_s: float(1,30)
  CAN_bus_usage: bool
  # MQTT Configuration
  mqttadresse_port: str?
  mqttuser: str?
  mqttpass: password?
  premium_section: str?
  premium_key: str?
  dashboard_section: str?
  dashboard_custom_cards_installed: bool
  dashboard_language: list(fr|en)
  dashboard_mode: list(legacy|html|both)
  # Telemetry
  Send_bip: bool
